services:
  db:
    image: mysql:8.0
    container_name: valorant_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: valorant_bot
      MYSQL_USER: bot_user
      MYSQL_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    container_name: valorant_bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: